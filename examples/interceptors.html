<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FetchPlus - Interceptors Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .demo-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #f5576c;
        }

        h2 {
            color: #f5576c;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .log-container {
            margin-top: 15px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px;
            border-left: 3px solid #4a9eff;
            padding-left: 10px;
        }

        .log-entry.request {
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .log-entry.response {
            border-color: #4ec9b0;
            color: #4ec9b0;
        }

        .log-entry.error {
            border-color: #f48771;
            color: #f48771;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-box {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box p {
            color: #e65100;
            margin: 5px 0;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            background: #4a9eff;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎯 FetchPlus Interceptors</h1>
        <p class="subtitle">Axios-style request, response, and error interceptors</p>

        <div class="info-box">
            <p>🔌 <strong>Interceptors Active:</strong> <span id="interceptorCount">0</span></p>
            <p>💡 Interceptors allow you to transform requests and responses globally</p>
        </div>

        <div class="demo-section">
            <h2>Interceptor Controls</h2>
            <div class="controls">
                <button onclick="addAuthInterceptor()">Add Auth Interceptor</button>
                <button onclick="addLoggingInterceptor()">Add Logging Interceptor</button>
                <button onclick="addHeaderInterceptor()">Add Custom Header</button>
                <button onclick="clearInterceptors()" class="secondary">Clear All Interceptors</button>
            </div>
            <div id="activeInterceptors" style="margin-top: 15px; color: #666;"></div>
        </div>

        <div class="demo-section">
            <h2>Test Requests</h2>
            <div class="controls">
                <button onclick="makeRequest()">Make Request</button>
                <button onclick="makeFailedRequest()"
                    style="background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);">Trigger Error</button>
                <button onclick="clearLogs()" class="secondary">Clear Logs</button>
            </div>
        </div>

        <div class="demo-section">
            <h2>Request/Response Log</h2>
            <div id="logContainer" class="log-container">
                <div style="color: #888; font-style: italic;">Logs will appear here...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import FetchPlus from '../dist/index.js';

        // Initialize FetchPlus
        FetchPlus.init();

        const interceptors = FetchPlus.getInterceptors();
        const activeInterceptors = [];
        let logCounter = 0;

        function updateInterceptorCount() {
            document.getElementById('interceptorCount').textContent = activeInterceptors.length;

            const container = document.getElementById('activeInterceptors');
            if (activeInterceptors.length === 0) {
                container.innerHTML = '<span style="color: #999;">No interceptors active</span>';
            } else {
                container.innerHTML = '<strong>Active:</strong> ' +
                    activeInterceptors.map(i => `<span class="badge">${i.name}</span>`).join(' ');
            }
        }

        function addLog(message, type = 'request') {
            const container = document.getElementById('logContainer');
            if (logCounter === 0) {
                container.innerHTML = '';
            }

            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            logCounter++;
        }

        window.addAuthInterceptor = function () {
            const id = interceptors.addRequestInterceptor((input, init) => {
                const headers = new Headers(init?.headers);
                headers.set('Authorization', 'Bearer fake-token-12345');
                addLog('🔐 Added Authorization header', 'request');
                return { input, init: { ...init, headers } };
            });

            activeInterceptors.push({ id, name: 'Auth' });
            updateInterceptorCount();
            addLog('✅ Auth interceptor registered', 'response');
        };

        window.addLoggingInterceptor = function () {
            const reqId = interceptors.addRequestInterceptor((input, init) => {
                const url = typeof input === 'string' ? input : input.url;
                addLog(`📤 Outgoing: ${init?.method || 'GET'} ${url}`, 'request');
                return { input, init };
            });

            const resId = interceptors.addResponseInterceptor((response) => {
                addLog(`📥 Incoming: ${response.status} ${response.statusText}`, 'response');
                return response;
            });

            activeInterceptors.push({ id: reqId, name: 'Request Logger' });
            activeInterceptors.push({ id: resId, name: 'Response Logger' });
            updateInterceptorCount();
            addLog('✅ Logging interceptors registered', 'response');
        };

        window.addHeaderInterceptor = function () {
            const id = interceptors.addRequestInterceptor((input, init) => {
                const headers = new Headers(init?.headers);
                headers.set('X-Custom-Header', 'FetchPlus-Demo');
                headers.set('X-Timestamp', Date.now().toString());
                addLog('📌 Added custom headers', 'request');
                return { input, init: { ...init, headers } };
            });

            activeInterceptors.push({ id, name: 'Custom Headers' });
            updateInterceptorCount();
            addLog('✅ Custom header interceptor registered', 'response');
        };

        window.clearInterceptors = function () {
            interceptors.clearAll();
            activeInterceptors.length = 0;
            updateInterceptorCount();
            addLog('🗑️ All interceptors cleared', 'error');
        };

        window.makeRequest = async function () {
            try {
                addLog('🚀 Initiating request...', 'request');
                const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const data = await response.json();
                addLog(`✅ Success: Received post "${data.title.substring(0, 30)}..."`, 'response');
            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');
            }
        };

        window.makeFailedRequest = async function () {
            // Add error interceptor
            const errorId = interceptors.addErrorInterceptor((error) => {
                addLog(`⚠️ Error interceptor caught: ${error.message}`, 'error');
                throw error; // Re-throw or return fallback
            });

            try {
                addLog('🚀 Making request to invalid URL...', 'request');
                await fetch('https://invalid-url-that-does-not-exist.com/data');
            } catch (error) {
                addLog(`❌ Request failed (as expected): ${error.message}`, 'error');
            }

            interceptors.removeInterceptor(errorId);
        };

        window.clearLogs = function () {
            document.getElementById('logContainer').innerHTML =
                '<div style="color: #888; font-style: italic;">Logs cleared...</div>';
            logCounter = 0;
        };

        updateInterceptorCount();
    </script>
</body>

</html>
